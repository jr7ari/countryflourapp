name: country_flour
description: "Country Flour - Premium Flour Brand App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.2

  # UI & Animations
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2
  gap: ^3.0.1
  http: ^1.2.2
  flutter_svg: ^2.0.10+1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Auth
  google_sign_in: ^6.2.1

  # Share
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Storage
  shared_preferences: ^2.3.0

  # Payment
  razorpay_flutter: ^1.3.6

  # Firebase & Analytics
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/cf_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  assets:
    - assets/images/cf.png
    - assets/images/cf_icon.png
  uses-material-design: true
